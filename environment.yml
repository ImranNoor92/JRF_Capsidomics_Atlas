# JRF Capsidomics Atlas - Conda Environment
# Create with:  conda env create -f environment.yml
# Update with:  conda env update -f environment.yml --prune
name: jrf_atlas
channels:
  - defaults
  - conda-forge
dependencies:
  - python=3.10
  # --- Core data handling ---
  - pandas>=1.5
  - numpy>=1.21
  # --- API / web requests ---
  - requests>=2.28
  # --- Bioinformatics ---
  - biopython>=1.79
  # --- Scientific computing ---
  - scipy>=1.9
  # --- Network analysis ---
  - networkx>=2.8
  # --- Visualization ---
  - matplotlib>=3.6
  - seaborn>=0.12
  # --- Excel I/O (optional) ---
  - openpyxl>=3.0
  - xlsxwriter>=3.0
